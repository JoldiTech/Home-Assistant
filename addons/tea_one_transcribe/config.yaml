# Home Assistant local add-on: Tea One Live Transcribe
# Speech-gated, on-device transcription of the Tea One camera audio.
#
# Deploy: copy this folder to /addons/tea_one_transcribe on the HAOS box, then
#   Settings -> Add-ons -> (reload) -> "Tea One Live Transcribe" -> Install.
# See README.md for the full runbook.
name: Tea One Live Transcribe
version: "0.1.0"
slug: tea_one_transcribe
description: >-
  On-device (whisper.cpp) transcription of the Tea One camera audio, gated on
  the camera's own speaking-detection AI, written to a searchable log.
arch:
  - aarch64
# Plain Alpine base image, our Python loop is PID 1 (no s6). Supervisor stops us
# with SIGTERM, which Python handles by exiting.
init: false
startup: application
boot: auto
# Needs the Core REST API (poll the gate sensor + call camera.record).
hassio_api: true
homeassistant_api: true
# media:rw  -> where camera.record writes clips (allowlisted for the recorder)
# share:rw  -> where the searchable transcript log lives
map:
  - media:rw
  - share:rw
options:
  camera_entity: camera.tea_one_low_resolution_channel
  gate_entity: binary_sensor.g6_dome_speaking_detected
  model: tiny.en
  language: en
  segment_seconds: 20
  lookback_seconds: 5
  threads: 3
  silence_threshold_db: -30
  log_path: /share/tea_one_transcript.log
schema:
  camera_entity: str
  gate_entity: str
  model: list(tiny.en|base.en|small.en)
  language: str
  segment_seconds: int(5,300)
  lookback_seconds: int(0,15)
  threads: int(1,4)
  silence_threshold_db: int(-60,0)
  log_path: str
