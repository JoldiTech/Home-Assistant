# Home Assistant local add-on: Emporium Hall Live Transcribe
#
# Second capture instance (alongside Tea One) — Emporium Hall is adjacent, so the
# two overlap. Shares the same run.py/Dockerfile/models as tea_one_transcribe;
# only the options differ. Runs at 2 threads so both cameras can transcribe a
# shared conversation without oversubscribing the Green's 4 cores.
name: Emporium Hall Live Transcribe
version: "0.1.0"
slug: emporium_hall_transcribe
description: >-
  On-device (whisper.cpp) transcription of the Emporium Hall camera audio, gated
  on the camera's speaking-detection AI, written to a searchable log.
arch:
  - aarch64
init: false
startup: application
boot: auto
hassio_api: true
homeassistant_api: true
map:
  - media:rw
  - share:rw
options:
  camera_entity: camera.emporium_hall_high_resolution_channel
  gate_entity: binary_sensor.emporium_hall_speaking_detected
  model: tiny.en
  model_dir: /share/whisper_models
  language: en
  segment_seconds: 20
  lookback_seconds: 5
  threads: 2
  silence_threshold_db: -45
  log_path: /share/emporium_hall_transcript.log
  ha_sensor: sensor.emporium_hall_transcript
  recent_lines: 30
schema:
  camera_entity: str
  gate_entity: str
  model: list(tiny.en|base.en|small.en)
  model_dir: str
  language: str
  segment_seconds: int(5,300)
  lookback_seconds: int(0,15)
  threads: int(1,4)
  silence_threshold_db: int(-60,0)
  log_path: str
  ha_sensor: str?
  recent_lines: int(1,200)
