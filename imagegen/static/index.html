<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>generate</title>
<style>
body{font-family:system-ui,sans-serif;max-width:640px;margin:4rem auto;padding:0 1rem;
     background:#111;color:#eee}
input,textarea,button{font-size:1rem;padding:.6rem;width:100%;box-sizing:border-box;
     margin-top:.5rem;background:#222;color:#eee;border:1px solid #444;border-radius:6px}
button{background:#3a6;color:#fff;border:none;cursor:pointer;margin-top:1rem;width:auto;
     padding:.6rem 1.2rem}
button:hover{background:#4b7}
button:disabled{opacity:.5;cursor:default}
.err{color:#f66}
label{display:block;margin-top:1rem;font-size:.85rem;color:#aaa}
h3{margin-top:1.5rem;font-size:1rem}
#prompts-status,#pass-status{color:#888;font-size:.85rem;min-height:1.2em}
img{max-width:100%;border-radius:8px;margin-top:1rem;display:block}
a{color:#6cf;text-decoration:none}
a:hover{text-decoration:underline}
.modes{display:flex;flex-direction:column;gap:.75rem;margin-top:1.5rem}
.modes button{width:100%}
.chat-layout{display:flex;gap:1rem;align-items:flex-start}
.chat-main{flex:1;min-width:0}
#transcript{margin:1rem 0;max-height:60vh;overflow-y:auto}
.msg{margin:.5rem 0;padding:.5rem;border-radius:6px;background:#1a1a1a}
.msg.user{border-left:3px solid #6cf}
.msg.assistant{border-left:3px solid #3a6}
#gallery-panel{width:180px;flex-shrink:0}
#gallery-panel h3{font-size:.85rem;color:#888;font-weight:normal;margin:1rem 0 .5rem}
#gallery{display:flex;flex-direction:column;gap:.5rem;max-height:70vh;overflow-y:auto}
#gallery img{margin:0;cursor:zoom-in;border-radius:6px}
#gallery-panel.wide{width:100%}
#gallery-panel.wide #gallery{flex-direction:row;flex-wrap:wrap;max-height:none}
#gallery-panel.wide #gallery img,#gallery-panel.wide .img-placeholder{width:140px;height:140px;object-fit:cover}
.img-placeholder{aspect-ratio:1;border-radius:6px;
     background:linear-gradient(100deg,#1a1a1a 30%,#2a2a2a 50%,#1a1a1a 70%);
     background-size:200% 100%;animation:shimmer 1.6s ease-in-out infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
#chat-status,#image-status{color:#888;margin-top:.5rem;font-size:.9rem}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;
     align-items:center;justify-content:center;cursor:zoom-out;z-index:10;padding:2rem}
#lightbox.open{display:flex}
#lightbox img{max-width:100%;max-height:100%;border-radius:8px}
@media (max-width: 560px){
  .chat-layout{flex-direction:column}
  #gallery-panel{width:100%}
  #gallery{flex-direction:row;flex-wrap:wrap;max-height:none}
  #gallery img{width:80px;height:80px;object-fit:cover}
  #gallery .img-placeholder{width:80px;height:80px}
}
</style>
</head>
<body>
<div id="app"><p>loading...</p></div>
<div id="lightbox"></div>
<script src="/static/app.js" defer></script>
</body>
</html>
